<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List با تایمر و دارک مود</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-md-12">
            <!-- Header Card -->
            <div class="card glass-card border-0 shadow-lg mb-4">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <div class="text-center">
                            <div class="icon-wrapper mb-2">
                                <i class="bi bi-clock-history text-primary" style="font-size: 2.5rem;"></i>
                            </div>
                            <h1 class="h3 fw-bold gradient-text mb-1">مدیریت وظایف با تایمر</h1>
                            <p class="text-muted small mb-0">وظایف خود را با تایمر مدیریت کنید</p>
                        </div>
                        <!-- Dark/Light Mode Toggle -->
                        <div class="theme-toggle-wrapper">
                            <button id="themeToggle" class="btn theme-toggle-btn" aria-label="تغییر تم">
                                <i class="bi bi-moon-fill theme-icon"></i>
                                <span class="theme-label">دارک</span>
                            </button>
                        </div>
                    </div>

                    <!-- Input Section -->
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="input-group input-group-lg shadow-sm">
                                <input type="text" id="todoInput" class="form-control form-control-lg border-0"
                                       placeholder="وظیفه جدید..." style="background: var(--input-bg);">
                                <button id="addBtn" class="btn btn-primary btn-lg px-4">
                                    <i class="bi bi-plus-lg me-2"></i>
                                    افزودن
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group input-group-lg shadow-sm">
                                <input type="number" id="timerInput" class="form-control form-control-lg border-0"
                                       placeholder="مدت زمان (دقیقه)" min="1" value="25"
                                       style="background: var(--input-bg); text-align: center;">
                                <span class="input-group-text bg-transparent border-0">
                                        <i class="bi bi-clock"></i>
                                    </span>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Stats -->
                    <div class="row g-2 mb-0">
                        <div class="col-3">
                            <div class="stat-card text-center p-2 rounded-3">
                                <span class="d-block fw-bold text-primary" id="totalTasks">0</span>
                                <small class="text-muted">کل</small>
                            </div>
                        </div>
                        <div class="col-3">
                            <div class="stat-card text-center p-2 rounded-3">
                                <span class="d-block fw-bold text-success" id="completedTasks">0</span>
                                <small class="text-muted">انجام شده</small>
                            </div>
                        </div>
                        <div class="col-3">
                            <div class="stat-card text-center p-2 rounded-3">
                                <span class="d-block fw-bold text-warning" id="pendingTasks">0</span>
                                <small class="text-muted">در انتظار</small>
                            </div>
                        </div>
                        <div class="col-3">
                            <div class="stat-card text-center p-2 rounded-3">
                                <span class="d-block fw-bold text-danger" id="totalTime">0</span>
                                <small class="text-muted">دقیقه</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Filter & Tasks Card -->
            <div class="card glass-card border-0 shadow-lg">
                <div class="card-body p-4 p-md-5">
                    <!-- Filter Buttons -->
                    <div class="btn-group w-100 mb-4" role="group">
                        <button class="filter-btn btn btn-outline-primary active flex-fill" data-filter="all">
                            <i class="bi bi-list-ul me-1"></i>
                            همه
                        </button>
                        <button class="filter-btn btn btn-outline-primary flex-fill" data-filter="active">
                            <i class="bi bi-circle me-1"></i>
                            فعال
                        </button>
                        <button class="filter-btn btn btn-outline-primary flex-fill" data-filter="completed">
                            <i class="bi bi-check-circle me-1"></i>
                            انجام شده
                        </button>
                        <button class="filter-btn btn btn-outline-primary flex-fill" data-filter="timed">
                            <i class="bi bi-clock me-1"></i>
                            دارای تایمر
                        </button>
                    </div>

                    <!-- Todo List -->
                    <div id="todoListContainer" class="todo-list-container" style="min-height: 300px;">
                        <ul id="todoList" class="list-unstyled mb-0"></ul>
                    </div>

                    <!-- Footer -->
                    <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                            <span id="taskCount" class="text-muted small">
                                <i class="bi bi-info-circle me-1"></i>
                                ۰ وظیفه
                            </span>
                        <button id="clearAllBtn" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-trash3 me-1"></i>
                            حذف همه
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="script.js"></script>
</body>
</html>
